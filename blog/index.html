<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>球队档案与故事 | STAR FC</title>
    <meta name="description" content="STAR FC 的球队博客与档案：赛季回顾、战报、人物故事与俱乐部记录。人来人往，从未散场。">
    <link rel="canonical" href="https://www.starfc.sg/blog/index.html">
    <meta name="theme-color" content="#0e0f11">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="STAR FC">
    <meta property="og:title" content="球队档案与故事 | STAR FC">
    <meta property="og:description" content="赛季回顾、战报、人物故事与俱乐部记录。">
    <meta property="og:url" content="https://www.starfc.sg/blog/index.html">
    <meta property="og:image" content="https://www.starfc.sg/assets/img/og/og-cover.png">
    <link rel="icon" type="image/png" href="../assets/img/club/starfclogo2-256.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
    <script src="../data/blog.js" defer></script>
</head>
<body>
    <header class="post-topbar">
        <div class="container post-topbar__inner">
            <a href="../" class="brand">
                <img src="../assets/img/club/starfclogo2-256.png" alt="STAR FC 官方队徽" class="brand__crest" width="30" height="30">
                <span><span class="brand__name" translate="no">STAR FC</span></span>
            </a>
            <a href="../#stories" class="post-topbar__back">← 返回官网</a>
        </div>
    </header>

    <main class="post-main">
        <div class="container container--narrow">
            <header class="post-head">
                <p class="post-tag"><span class="chip chip--red">Archive</span></p>
                <h1 class="post-title">球队档案与故事</h1>
                <p class="post-meta">赛季回顾 · 战报 · 人物 · 俱乐部记录</p>
            </header>
            <noscript><p>文章列表需要启用 JavaScript。最新文章：<a href="star-fc-chronicle.html">STAR FC 编年史</a></p></noscript>
            <div class="post-list" id="post-list"></div>
        </div>
    </main>

    <script>
    (function () {
        function render() {
            var posts = (window.STARFC && window.STARFC.blog && window.STARFC.blog.posts) || [];
            var list = document.getElementById('post-list');
            if (!list) return;
            list.innerHTML = posts.slice().sort(function (a, b) {
                return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0);
            }).map(function (p) {
                var external = p.type === 'external';
                var href = external ? p.url : p.slug + '.html';
                var target = external ? ' target="_blank" rel="noopener noreferrer"' : '';
                var arrow = external ? '查看原文 →' : '阅读全文 →';
                function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
                return '<a href="' + esc(href) + '"' + target + ' class="story-card">' +
                    '<span><span class="chip chip--red">' + esc(p.tagZh) + '</span></span>' +
                    '<h2 class="story-card__title">' + esc(p.titleZh) + '</h2>' +
                    '<p class="story-card__desc">' + esc(p.excerptZh) + '</p>' +
                    '<div class="story-card__foot"><span class="story-card__date">' + esc(p.date) + '</span>' +
                    '<span class="story-card__more">' + arrow + '</span></div></a>';
            }).join('');
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', render);
        else render();
    })();
    </script>
</body>
</html>
