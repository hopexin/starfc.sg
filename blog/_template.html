<!DOCTYPE html>
<!-- =====================================================================
STAR FC 博客文章模板（维护者/CodeX 专用，本文件不会被站点引用）
========================================================================
发一篇文章的完整流程见 AGENTS.md「任务 C」。速记版：
1. 复制本文件为 blog/<slug>.html（slug 小写 kebab-case，建议含日期语义，全局唯一）
2. 全文替换以下占位符（共 5 个，一个都不能留）：
   【SLUG】     → 文件名里的 slug（出现在 canonical / og:url / JSON-LD url）
   【标题】     → 文章标题（出现 4 处：title / og:title / twitter:title / h1 / JSON-LD headline）
   【描述】     → 一两句摘要（meta description / og:description）
   【日期】     → YYYY-MM-DD（og / JSON-LD / 文内 meta 行）
   【标签】     → 分类词（赛季档案 / 战报 / 人物 / 公告…）
3. 在 <div class="post-body"> 里用下方"组件库"拼正文
4. 在 data/blog.js 的 posts 最前面加索引条目（type: "post"）
5. 运行 node scripts/validate-data.js && node scripts/update-sitemap.js
6. 本地预览确认后提交
===================================================================== -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【标题】 | STAR FC</title>
    <meta name="description" content="【描述】">
    <link rel="canonical" href="https://www.starfc.sg/blog/【SLUG】.html">
    <meta name="theme-color" content="#0e0f11">

    <meta property="og:type" content="article">
    <meta property="og:site_name" content="STAR FC">
    <meta property="og:title" content="【标题】">
    <meta property="og:description" content="【描述】">
    <meta property="og:url" content="https://www.starfc.sg/blog/【SLUG】.html">
    <meta property="og:image" content="https://www.starfc.sg/assets/img/og/og-cover.png">
    <meta property="article:published_time" content="【日期】">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="【标题】">
    <meta name="twitter:image" content="https://www.starfc.sg/assets/img/og/og-cover.png">
    <!-- 若文章有自己的封面图：把上面两个 og:image / twitter:image 换成封面的绝对地址 -->

    <link rel="icon" type="image/png" href="../assets/img/club/starfclogo2-256.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": "【标题】",
      "datePublished": "【日期】",
      "inLanguage": "zh-CN",
      "image": "https://www.starfc.sg/assets/img/og/og-cover.png",
      "url": "https://www.starfc.sg/blog/【SLUG】.html",
      "author": { "@type": "SportsTeam", "name": "STAR FC", "url": "https://www.starfc.sg/" },
      "publisher": { "@type": "SportsTeam", "name": "STAR FC", "url": "https://www.starfc.sg/" }
    }
    </script>
</head>
<body>
    <header class="post-topbar">
        <div class="container post-topbar__inner">
            <a href="../" class="brand">
                <img src="../assets/img/club/starfclogo2-256.png" alt="STAR FC 官方队徽" class="brand__crest" width="30" height="30">
                <span><span class="brand__name" translate="no">STAR FC</span></span>
            </a>
            <a href="../#stories" class="post-topbar__back">← 返回官网</a>
        </div>
    </header>

    <main class="post-main">
        <article class="container container--narrow">
            <header class="post-head">
                <p class="post-tag"><span class="chip chip--red">【标签】</span></p>
                <h1 class="post-title">【标题】</h1>
                <p class="post-meta">【日期】 · STAR FC 球队档案</p>
            </header>

            <div class="post-body">
                <p>开篇段落。语气参考站点主标语「人来人往，从未散场」：内敛、具体、不喊口号；成绩用数字说话，人物用事迹说话。</p>

                <!-- ============ 组件库：按需复制，用不到的删掉 ============ -->

                <!-- 小标题 -->
                <h2>小标题</h2>
                <p>正文段落。</p>

                <!-- 数据速览条（2×2 / 桌面 4 列）：数值可为比分、场次、进球数等 -->
                <div class="post-stats">
                    <div class="stat-tile"><p class="stat-tile__value">50</p><p class="stat-tile__label">比赛</p></div>
                    <div class="stat-tile stat-tile--win"><p class="stat-tile__value">38</p><p class="stat-tile__label">胜</p></div>
                    <div class="stat-tile stat-tile--accent"><p class="stat-tile__value">234</p><p class="stat-tile__label">进球</p></div>
                    <div class="stat-tile stat-tile--loss"><p class="stat-tile__value">8</p><p class="stat-tile__label">负</p></div>
                </div>

                <!-- 无序列表（红点符号自动） -->
                <ul>
                    <li><strong>要点</strong>：说明文字。</li>
                    <li><strong>要点</strong>：说明文字。</li>
                </ul>

                <!-- 图片（放 assets/img/news/，jpg/webp，宽 ≥1200px；alt 必填） -->
                <figure>
                    <img src="../assets/img/news/示例.jpg" alt="一句话说清画面内容" loading="lazy" decoding="async">
                    <figcaption>图注：时间 · 地点 · 事件</figcaption>
                </figure>

                <!-- YouTube 集锦内嵌（16:9）：把 VIDEO_ID 换成链接里的 11 位 ID -->
                <div class="post-embed">
                    <iframe src="https://www.youtube.com/embed/VIDEO_ID" title="比赛集锦标题" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>

                <!-- 引用块 -->
                <blockquote>适合放一句球员原话、一段值得记住的话。</blockquote>

                <!-- 站内链接写相对路径 -->
                <p>相关内容：<a href="../#fixtures">赛程战绩</a> · <a href="../#media">媒体中心</a></p>

                <!-- ============ 组件库结束 ============ -->
            </div>

            <footer class="post-footer">
                <span>© 2002–2026 STAR FC</span>
                <span class="seal" style="margin-top:0">以球会友</span>
            </footer>
        </article>
    </main>
</body>
</html>
